<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Leave Requests</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }

        /* Navbar */
        .navbar {
            background-color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            height: 56px;
        }

        .navbar .brand {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 8px;
        }

        .navbar ul li a {
            color: #ccd6e0;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .navbar ul li a:hover {
            background-color: #3d5166;
            color: #ffffff;
        }

        .navbar ul li a.logout {
            color: #e74c3c;
        }

        .navbar ul li a.logout:hover {
            background-color: #e74c3c;
            color: #ffffff;
        }

        /* Page content */
        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 56px);
        }

        h1 {
            color: #555;
            font-size: 22px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a class="brand" href="/admin/dashboard">Admin Panel</a>
        <ul>
            <li><a href="/admin/dashboard">Dashboard</a></li>
            <li><a href="/admin/leave-requests">View Leave Requests</a></li>
            <li><a class="logout" href="/admin/logout">Logout</a></li>
        </ul>
    </nav>

    <div class="content">
        <h1>No leave requests found for now</h1>
    </div>

</body>
</html>
